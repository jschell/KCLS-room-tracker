name: Validate Library Config

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 9am UTC (1am Pacific)
  workflow_dispatch:       # Also runnable on demand

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Validate library and space ID config
        run: uv run validate_config.py
        # Exit code 1 = discrepancies found → job fails → GitHub sends email alert
